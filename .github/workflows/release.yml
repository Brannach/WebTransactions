name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  release:
    runs-on: windows-latest

    permissions:
      contents: write

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 9.0.x

      - name: Publish self-contained executable
        run: dotnet publish src/WebTransactions.Api/WebTransactions.Api.csproj -c Release --self-contained true -r win-x64 -p:PublishSingleFile=true -p:IncludeNativeLibrariesForSelfExtract=true -o ./publish

      - name: Create release archive
        shell: pwsh
        run: Compress-Archive -Path "./publish/*" -DestinationPath "./WebTransactions.zip"

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          files: ./WebTransactions.zip
          generate_release_notes: true
